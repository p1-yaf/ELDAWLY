<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELDAWLY | التحميل</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/loading.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>
<body>
    <!-- جسيمات الخلفية المتحركة -->
    <div id="particles-js"></div>
    
    <!-- عناصر خلفية إضافية -->
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
    
    <!-- حاوية المحتوى الرئيسي -->
    <div class="loading-wrapper">
        <!-- الشعار مع تأثيرات -->
        <div class="logo-container">
            <div class="logo-glow"></div>
            <img src="assets/images/logo.png" alt="ELDAWLY" class="main-logo" id="mainLogo">
            <h1 class="store-name">
                <span class="el">EL</span><span class="dawly">DAWLY</span>
            </h1>
            <p class="store-tagline">PUBG STORE</p>
        </div>
        
        <!-- شريط التحميل المتطور -->
        <div class="loader-container">
            <div class="loader-progress-container">
                <div class="loader-progress-bar" id="progressBar"></div>
            </div>
            
            <div class="loader-info">
                <span class="loader-status" id="loadingStatus">جاري تهيئة المتجر...</span>
                <span class="loader-percentage" id="loadingPercentage">0%</span>
            </div>
            
            <!-- نقاط التحميل المتحركة -->
            <div class="loader-dots">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        
        <!-- عناصر PUBG متحركة -->
        <div class="pubg-elements">
            <div class="pubg-helmet"></div>
            <div class="pubg-pan"></div>
            <div class="pubg-weapon"></div>
        </div>
        
        <!-- شعار PUBG -->
        <div class="pubg-brand">
            <img src="assets/images/pubg-logo.png" alt="PUBG" class="pubg-logo">
            <span>BATTLEGROUNDS</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="assets/js/loading.js"></script>
</body>
</html>
